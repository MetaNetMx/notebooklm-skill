name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  install-and-syntax-check:
    name: Install deps & syntax check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile all scripts (syntax check)
        # bash is required here: on windows-latest, steps default to PowerShell,
        # which does not glob-expand scripts/*.py and passes it through literally,
        # causing py_compile to fail with "[Errno 22] Invalid argument".
        shell: bash
        run: python -m py_compile scripts/*.py

      - name: Confirm patchright imports correctly
        run: python -c "import patchright; print('patchright OK:', patchright.__file__)"

  # Note: we deliberately do NOT launch a real Chrome/Google login in CI.
  # This skill authenticates against a live Google account interactively;
  # scripting that in a headless CI runner would violate Google's ToS and
  # isn't something this project wants to encourage. The job above proves
  # the skill installs and its scripts are syntactically valid on all three
  # major desktop platforms - the actual auth flow is exercised locally by
  # each user during one-time setup.
