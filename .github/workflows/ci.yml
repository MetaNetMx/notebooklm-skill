name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  install-and-test:
    name: Install and test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install preferred backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pyyaml "patchright>=1.55,<2"

      - name: Compile scripts
        shell: bash
        run: python -m py_compile scripts/*.py tests/*.py .github/skill_tools/*.py

      - name: Run unit tests
        run: pytest -q

      - name: Validate OpenAI skill package
        run: python .github/skill_tools/quick_validate.py .

      - name: Check skill structure
        shell: bash
        run: |
          test -f SKILL.md
          test -f agents/openai.yaml
          python -c "from pathlib import Path; text=Path('SKILL.md').read_text(encoding='utf-8'); assert text.startswith('---\nname: notebooklm\n')"

      - name: Confirm preferred browser backend
        run: python -c "import sys; sys.path.insert(0, 'scripts'); import browser_api; assert browser_api.BROWSER_BACKEND == 'patchright'; print(browser_api.BROWSER_BACKEND)"

  playwright-fallback:
    name: Test Playwright fallback
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fallback backend
        run: pip install -r requirements.txt pytest playwright

      - name: Confirm fallback selection
        run: python -c "import sys; sys.path.insert(0, 'scripts'); import browser_api; assert browser_api.BROWSER_BACKEND == 'playwright'; print(browser_api.BROWSER_BACKEND)"

      - name: Run tests with Playwright only
        run: pytest -q

      - name: Exercise wrapper without authentication
        shell: bash
        run: |
          set +e
          output=$(python scripts/run.py auth_manager.py status 2>&1)
          code=$?
          set -e
          echo "$output"
          test "$code" -eq 3
          grep -q "auth_manager.py ensure --timeout 15" <<< "$output"

  package-skill:
    name: Package skill.zip
    runs-on: ubuntu-latest
    needs: [install-and-test, playwright-fallback]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: pip install pyyaml

      - name: Validate skill
        run: python .github/skill_tools/quick_validate.py .

      - name: Build skill.zip
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          root = Path('.').resolve()
          output = root / 'skill.zip'
          excluded_parts = {'.git', '.venv', '__pycache__', '.pytest_cache', 'data'}
          excluded_files = {'skill.zip'}

          with zipfile.ZipFile(output, 'w', zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob('*')):
                  if not path.is_file():
                      continue
                  relative = path.relative_to(root)
                  if path.name in excluded_files or any(part in excluded_parts for part in relative.parts):
                      continue
                  archive.write(path, Path('notebooklm') / relative)

          size = output.stat().st_size
          if size > 25 * 1024 * 1024:
              raise SystemExit(f'skill.zip exceeds 25 MiB: {size} bytes')
          print(f'Created {output} ({size} bytes)')
          PY

      - name: Upload skill package
        uses: actions/upload-artifact@v4
        with:
          name: notebooklm-skill
          path: skill.zip
          if-no-files-found: error

  # Live Google authentication and NotebookLM DOM tests intentionally remain local.
