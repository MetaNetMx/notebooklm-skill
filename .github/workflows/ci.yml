name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  install-and-test:
    name: Install and test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile scripts
        shell: bash
        run: python -m py_compile scripts/*.py tests/*.py

      - name: Run unit tests
        run: pytest -q

      - name: Check skill structure
        shell: bash
        run: |
          test -f SKILL.md
          test -f agents/openai.yaml
          python -c "from pathlib import Path; text=Path('SKILL.md').read_text(encoding='utf-8'); assert text.startswith('---\nname: notebooklm\n')"

      - name: Confirm Patchright import
        run: python -c "import patchright; print('patchright OK:', patchright.__file__)"

  # Live Google authentication and NotebookLM DOM tests intentionally remain local.
